<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Raum Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 20px;
    }

    .tab {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
    }

    .tab.active {
      background: #555;
    }

    .card {
      background: #1e1e1e;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
    }

    .green { color: #00ff88; }
    .yellow { color: #ffcc00; }
    .red { color: #ff4444; }

    #weather, #sliders {
      display: none;
    }

    input[type=range] {
      width: 80%;
    }
  </style>
</head>

<body>

<h1>🏠 Raum Monitor</h1>
<div id="modeLabel">📡 Live-Modus</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('sensor', this)">📊 Sensor</div>
  <div class="tab" onclick="showTab('weather', this)">🌦️ Wetter</div>
  <div class="tab" onclick="openHandout()">📄 Handout</div>
  <div class="tab" onclick="toggleDemo()">🧪 Demo</div>
</div>

<div id="sensor">
  <div class="card">🌡️ Temperatur: <span id="temp">--</span> °C</div>
  <div class="card">💧 Luftfeuchte: <span id="hum">--</span> %</div>

  <div class="card">
    🫁 CO₂: <span id="co2">--</span> ppm
    <div id="co2Status"></div>
  </div>

  <div class="card">🔧 KTY Sensor: <span id="kty">--</span> °C</div>
</div>

<!-- 🧪 Slider Bereich -->
<div id="sliders">
  <div class="card">
    🌡️ Temperatur: <input type="range" min="0" max="40" value="22" id="s_temp">
  </div>
  <div class="card">
    💧 Luftfeuchte: <input type="range" min="0" max="100" value="50" id="s_hum">
  </div>
  <div class="card">
    🫁 CO₂: <input type="range" min="400" max="2000" value="800" id="s_co2">
  </div>
  <div class="card">
    🔧 KTY: <input type="range" min="0" max="50" value="22" id="s_kty">
  </div>
</div>

<div id="weather">
  <div class="card">🌡️ Temperatur: <span id="wtemp"></span> °C</div>
  <div class="card">🌥️ Wetter: <span id="desc"></span></div>
</div>

<script>
const url = "https://fsat23-co2-default-rtdb.europe-west1.firebasedatabase.app/sensor.json";

let demoMode = false;
let warned = false;

// Tabs
function showTab(tab, el){
  document.getElementById("sensor").style.display = (tab==="sensor") ? "block":"none";
  document.getElementById("weather").style.display = (tab==="weather") ? "block":"none";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

// Handout
function openHandout(){
  window.open("handout.pdf","_blank");
}

// Demo Toggle
function toggleDemo(){
  demoMode = !demoMode;

  document.getElementById("modeLabel").innerText =
    demoMode ? "🧪 Demo-Modus" : "📡 Live-Modus";

  document.getElementById("sliders").style.display =
    demoMode ? "block" : "none";
}

// CO2 Farbe
function updateCO2Color(co2){
  const s = document.getElementById("co2Status");

  if(co2 < 800){
    s.innerText="🟢 Gut";
    s.className="green";
    warned=false;
  } else if(co2 < 1200){
    s.innerText="🟡 Lüften empfohlen";
    s.className="yellow";
    warned=false;
  } else {
    s.innerText="🔴 SCHLECHT – LÜFTEN!";
    s.className="red";

    if(!warned && Notification.permission==="granted"){
      new Notification("🚨 CO₂ zu hoch!", {body:"Bitte lüften!", icon:"icon.png"});
      warned=true;
    }
  }
}

// Daten laden
function loadData(){

  if(demoMode){
    let temp = document.getElementById("s_temp").value;
    let hum = document.getElementById("s_hum").value;
    let co2 = document.getElementById("s_co2").value;
    let kty = document.getElementById("s_kty").value;

    document.getElementById("temp").innerText=temp;
    document.getElementById("hum").innerText=hum;
    document.getElementById("co2").innerText=co2;
    document.getElementById("kty").innerText=kty;

    updateCO2Color(co2);
    return;
  }

  fetch(url)
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("temp").innerText=d.temp;
      document.getElementById("hum").innerText=d.hum;
      document.getElementById("co2").innerText=d.co2;
      document.getElementById("kty").innerText=d.kty;
      updateCO2Color(d.co2);
    });
}

// Wetter
navigator.geolocation.getCurrentPosition(pos=>{
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("wtemp").innerText=d.current_weather.temperature;
    document.getElementById("desc").innerText="Live Wetter";
  });
});

// Notifications erlauben
if("Notification" in window){
  Notification.requestPermission();
}

// Update
setInterval(loadData, 1000);
loadData();

</script>

</body>
</html>
